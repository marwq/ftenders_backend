services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MONGO_URL: mongodb://ftenders-mongo-1:27017
      MONGO_DB: ftenders
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./src:/app/src
    command: uv run uvicorn src.app:app --host 0.0.0.0 --port 8001 --reload
    restart: on-failure
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 1s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  default:
    name: shared-network
    external: true